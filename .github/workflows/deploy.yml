name: Deploy to VPS

# Déclenché automatiquement après le succès du workflow de release
on:
  workflow_run:
    workflows: ["Release — Build & Push Docker Image"]
    types: [completed]

  # Déclenchement manuel : redéploiement forcé ou déploiement sur un VPS secondaire
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag de l'image à déployer (ex: 1.2.0 ou latest)"
        required: false
        default: "latest"
      target:
        description: "VPS cible"
        required: true
        default: "vps1"
        type: choice
        options:
          - vps1
          - vps2
          - both

jobs:
  # ── VPS principal (auto après release OU manuel avec target=vps1/both) ──────
  deploy-vps1:
    name: Deploy → VPS principal
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' ||
      github.event_name == 'workflow_dispatch' && (inputs.target == 'vps1' || inputs.target == 'both')

    steps:
      - name: Résoudre le tag à déployer
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            REF="${{ github.event.workflow_run.head_branch }}"
            VERSION="${REF#v}"
            echo "TAG=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/santalina

            echo "==> Mise à jour de l'image vers le tag : ${{ steps.tag.outputs.TAG }}"

            TAG="${{ steps.tag.outputs.TAG }}"
            if [ "$TAG" != "latest" ]; then
              sed -i "s|/santalina:.*|/santalina:${TAG}|" docker-compose.yml
            fi

            docker compose pull app
            docker compose up -d --no-deps --force-recreate app
            docker image prune -f

            echo "==> Déploiement terminé (VPS principal)"

      - name: Notifier en cas d'échec
        if: failure()
        run: |
          echo "::error::Le déploiement sur le VPS principal a échoué."
          echo "Vérifiez les secrets VPS_HOST, VPS_USER et VPS_SSH_KEY."

  # ── VPS secondaire (manuel uniquement avec target=vps2/both) ────────────────
  deploy-vps2:
    name: Deploy → VPS secondaire
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.target == 'vps2' || inputs.target == 'both')

    steps:
      - name: Résoudre le tag à déployer
        id: tag
        run: |
          echo "TAG=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS2_HOST }}
          username: ${{ secrets.VPS2_USER }}
          key:      ${{ secrets.VPS2_SSH_KEY }}
          script: |
            set -e
            cd /opt/santalina

            echo "==> Mise à jour de l'image vers le tag : ${{ steps.tag.outputs.TAG }}"

            TAG="${{ steps.tag.outputs.TAG }}"
            if [ "$TAG" != "latest" ]; then
              sed -i "s|/santalina:.*|/santalina:${TAG}|" docker-compose.yml
            fi

            docker compose pull app
            docker compose up -d --no-deps --force-recreate app
            docker image prune -f

            echo "==> Déploiement terminé (VPS secondaire)"

      - name: Notifier en cas d'échec
        if: failure()
        run: |
          echo "::error::Le déploiement sur le VPS secondaire a échoué."
          echo "Vérifiez les secrets VPS2_HOST, VPS2_USER et VPS2_SSH_KEY."
