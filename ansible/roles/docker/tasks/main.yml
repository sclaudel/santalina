---
# ── Dépendances système ───────────────────────────────────────────────────────
- name: Mettre à jour le cache APT
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Installer les paquets prérequis
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - ufw
      - python3-pip
      - openssl
    state: present

# ── Docker ────────────────────────────────────────────────────────────────────
- name: Créer le répertoire /etc/apt/keyrings
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Télécharger la clé GPG officielle Docker (format dearmored)
  ansible.builtin.shell:
    cmd: >
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg
      | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    creates: /etc/apt/keyrings/docker.gpg

- name: Corriger les permissions de la clé GPG Docker
  ansible.builtin.file:
    path: /etc/apt/keyrings/docker.gpg
    mode: '0644'

- name: Ajouter le dépôt Docker
  ansible.builtin.apt_repository:
    repo: >
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg]
      https://download.docker.com/linux/ubuntu
      {{ ansible_facts['distribution_release'] }} stable
    state: present
    filename: docker

- name: Installer Docker Engine, CLI et le plugin Compose
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Activer et démarrer le service Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Ajouter l'utilisateur de déploiement au groupe docker
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

# ── Pare-feu UFW ──────────────────────────────────────────────────────────────
- name: Autoriser SSH (port 22)
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Autoriser HTTP (port 80)
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Autoriser HTTPS (port 443)
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Activer UFW avec politique par défaut deny
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming
