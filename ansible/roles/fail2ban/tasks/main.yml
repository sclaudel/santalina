---
# ── Installation ───────────────────────────────────────────────────────────────
- name: Installer fail2ban
  ansible.builtin.apt:
    name:
      - fail2ban
      - iptables
    state: present
    update_cache: true

# ── Filtre personnalisé — brute-force endpoint authentification ────────────────
- name: Créer le répertoire filter.d si absent
  ansible.builtin.file:
    path: /etc/fail2ban/filter.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Déployer le filtre nginx-santalina-auth
  ansible.builtin.template:
    src: filter.d/nginx-santalina-auth.conf.j2
    dest: /etc/fail2ban/filter.d/nginx-santalina-auth.conf
    owner: root
    group: root
    mode: "0644"
  notify: Redémarrer fail2ban

# ── Configuration principale ───────────────────────────────────────────────────
- name: Déployer jail.local
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: Redémarrer fail2ban

# ── Service ────────────────────────────────────────────────────────────────────
- name: Activer et démarrer fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true
