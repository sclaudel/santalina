---
# ── Répertoires ───────────────────────────────────────────────────────────────
- name: Créer le répertoire de déploiement
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0750"

- name: Créer le répertoire des clés JWT
  ansible.builtin.file:
    path: "{{ app_dir }}/keys"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"

- name: Créer le répertoire nginx
  ansible.builtin.file:
    path: "{{ app_dir }}/nginx"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

# ── Clés RSA JWT ──────────────────────────────────────────────────────────────
- name: Vérifier si la clé privée JWT existe déjà
  ansible.builtin.stat:
    path: "{{ app_dir }}/keys/privateKey.pem"
  register: jwt_private_key_stat

- name: Générer la clé privée RSA 2048 bits PKCS8 (si absente)
  ansible.builtin.command:
    cmd: >-
      openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048
      -out {{ app_dir }}/keys/privateKey.pem
  when: not jwt_private_key_stat.stat.exists
  become: false

- name: Extraire la clé publique (si absente)
  ansible.builtin.command:
    cmd: >-
      openssl pkey -in {{ app_dir }}/keys/privateKey.pem
      -pubout -out {{ app_dir }}/keys/publicKey.pem
  when: not jwt_private_key_stat.stat.exists
  become: false

- name: Restreindre les permissions des clés JWT
  ansible.builtin.file:
    path: "{{ app_dir }}/keys/{{ item }}"
    mode: "0600"
    owner: "{{ ansible_user }}"
  loop:
    - privateKey.pem
    - publicKey.pem

- name: Lire le contenu de la clé publique JWT
  ansible.builtin.slurp:
    src: "{{ app_dir }}/keys/publicKey.pem"
  register: jwt_public_key_content

- name: Lire le contenu de la clé privée JWT
  ansible.builtin.slurp:
    src: "{{ app_dir }}/keys/privateKey.pem"
  register: jwt_private_key_content

# ── Fichiers de configuration ─────────────────────────────────────────────────
- name: Déployer le fichier .env (variables d'environnement)
  ansible.builtin.template:
    src: env.j2
    dest: "{{ app_dir }}/.env"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: Déployer docker-compose.prod.yml
  ansible.builtin.template:
    src: docker-compose.prod.yml.j2
    dest: "{{ app_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0640"

# ── Nginx — phase 1 : HTTP only (pour obtenir le cert Let's Encrypt) ─────────
- name: Déployer la configuration Nginx (HTTP uniquement, première installation)
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ app_dir }}/nginx/nginx.conf"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  vars:
    ssl_enabled: false

# ── Démarrage des services ────────────────────────────────────────────────────
- name: Télécharger les images Docker depuis DockerHub
  ansible.builtin.command:
    cmd: docker compose pull
    chdir: "{{ app_dir }}"
  become: false

- name: Démarrer tous les services
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ app_dir }}"
  become: false

# ── Import optionnel de données existantes ────────────────────────────────────
- name: Attendre que PostgreSQL soit prêt
  ansible.builtin.command:
    cmd: docker compose exec -T db pg_isready -U santalina
    chdir: "{{ app_dir }}"
  become: false
  register: pg_ready
  retries: 15
  delay: 3
  until: pg_ready.rc == 0
  when: db_seed_file is defined and db_seed_file != ''

- name: Copier le script SQL de données sur le serveur
  ansible.builtin.copy:
    src: "{{ db_seed_file }}"
    dest: "{{ app_dir }}/seed.sql"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  when: db_seed_file is defined and db_seed_file != ''

- name: Injecter via docker cp + psql
  block:
    - name: Copier le fichier SQL dans le conteneur db
      ansible.builtin.command:
        cmd: docker cp {{ app_dir }}/seed.sql santalina-db:/tmp/seed.sql
        chdir: "{{ app_dir }}"
      become: false

    - name: Exécuter le script SQL dans le conteneur
      ansible.builtin.command:
        cmd: >-
          docker compose exec -T db
          psql -U santalina -d santalina -f /tmp/seed.sql
        chdir: "{{ app_dir }}"
      become: false
      register: seed_result
      changed_when: true

    - name: Afficher le résultat de l'import SQL
      ansible.builtin.debug:
        msg: "Import SQL : {{ seed_result.stdout_lines | default([]) }}"

    - name: Supprimer le fichier SQL temporaire du serveur
      ansible.builtin.file:
        path: "{{ app_dir }}/seed.sql"
        state: absent
  when: db_seed_file is defined and db_seed_file != ''

# ── Let's Encrypt (première obtention du certificat SSL) ─────────────────────
- name: Vérifier si le certificat SSL existe déjà dans le volume certbot
  ansible.builtin.command:
    cmd: >
      docker compose run --rm --entrypoint sh certbot
      -c "test -f /etc/letsencrypt/live/{{ app_domain }}/fullchain.pem && echo EXISTS"
    chdir: "{{ app_dir }}"
  become: false
  register: ssl_cert_existing
  failed_when: false
  changed_when: false
  when: obtain_ssl | default(true)

- name: Obtenir le certificat SSL Let's Encrypt (uniquement si absent)
  ansible.builtin.command:
    cmd: >
      docker compose run --rm --entrypoint certbot certbot certonly
      --webroot -w /var/www/certbot
      -d {{ app_domain }}
      --email {{ letsencrypt_email }}
      --agree-tos --non-interactive --no-eff-email
    chdir: "{{ app_dir }}"
  become: false
  register: certbot_result
  when: obtain_ssl | default(true) and (ssl_cert_existing.stdout | default('') != 'EXISTS')
  ignore_errors: true

- name: Afficher le résultat de Let's Encrypt
  ansible.builtin.debug:
    msg: "Certbot : {{ certbot_result.stdout | default('certificat déjà présent, aucune demande effectuée') }}"
  when: obtain_ssl | default(true)

# ── Nginx — phase 2 : HTTPS (après obtention ou détection du cert) ────────────
- name: Déployer la configuration Nginx avec HTTPS
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ app_dir }}/nginx/nginx.conf"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  vars:
    ssl_enabled: true
  when: >
    obtain_ssl | default(true) and (
      (ssl_cert_existing.stdout | default('')) == 'EXISTS' or
      (certbot_result.rc | default(1)) == 0
    )

- name: Redémarrer Nginx pour activer la configuration HTTPS
  ansible.builtin.command:
    cmd: docker compose restart nginx
    chdir: "{{ app_dir }}"
  become: false
  when: >
    obtain_ssl | default(true) and (
      (ssl_cert_existing.stdout | default('')) == 'EXISTS' or
      (certbot_result.rc | default(1)) == 0
    )
