---
# ── Répertoires ───────────────────────────────────────────────────────────────
- name: Créer le répertoire de déploiement
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0750"

- name: Créer le répertoire des clés JWT
  ansible.builtin.file:
    path: "{{ app_dir }}/keys"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"

- name: Créer le répertoire nginx
  ansible.builtin.file:
    path: "{{ app_dir }}/nginx"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Créer le répertoire letsencrypt (bind mount — persiste après docker compose down -v)
  ansible.builtin.file:
    path: "{{ app_dir }}/letsencrypt"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Créer le répertoire certbot-www (challenge ACME)
  ansible.builtin.file:
    path: "{{ app_dir }}/certbot-www"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Créer le répertoire des logs nginx (lu par fail2ban sur l'hôte)
  ansible.builtin.file:
    path: "{{ app_dir }}/logs/nginx"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Créer le répertoire des logs applicatifs (bind mount vers le conteneur app)
  ansible.builtin.file:
    path: "{{ app_dir }}/logs/app"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0777"

- name: Créer le répertoire des clés DKIM (bind mount — persiste après docker compose down -v)
  ansible.builtin.file:
    path: "{{ app_dir }}/dkim_keys"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"

# ── Clés RSA JWT ──────────────────────────────────────────────────────────────
- name: Vérifier si la clé privée JWT existe déjà
  ansible.builtin.stat:
    path: "{{ app_dir }}/keys/privateKey.pem"
  register: jwt_private_key_stat

- name: Générer la clé privée RSA 2048 bits PKCS8 (si absente)
  ansible.builtin.command:
    cmd: >-
      openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048
      -out {{ app_dir }}/keys/privateKey.pem
  when: not jwt_private_key_stat.stat.exists
  become: false

- name: Extraire la clé publique (si absente)
  ansible.builtin.command:
    cmd: >-
      openssl pkey -in {{ app_dir }}/keys/privateKey.pem
      -pubout -out {{ app_dir }}/keys/publicKey.pem
  when: not jwt_private_key_stat.stat.exists
  become: false

- name: Définir les permissions des clés JWT
  ansible.builtin.file:
    path: "{{ app_dir }}/keys/{{ item }}"
    mode: "0644"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  loop:
    - privateKey.pem
    - publicKey.pem

- name: Lire le contenu de la clé publique JWT
  ansible.builtin.slurp:
    src: "{{ app_dir }}/keys/publicKey.pem"
  register: jwt_public_key_content

- name: Lire le contenu de la clé privée JWT
  ansible.builtin.slurp:
    src: "{{ app_dir }}/keys/privateKey.pem"
  register: jwt_private_key_content

# ── Fichiers de configuration ─────────────────────────────────────────────────
- name: Déployer le fichier .env (variables d'environnement)
  ansible.builtin.template:
    src: env.j2
    dest: "{{ app_dir }}/.env"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: Déployer docker-compose.prod.yml
  ansible.builtin.template:
    src: docker-compose.prod.yml.j2
    dest: "{{ app_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0640"

# ── Rotation des logs (logrotate) ─────────────────────────────────────────────
- name: Installer logrotate (si absent)
  ansible.builtin.apt:
    name: logrotate
    state: present
  become: true

- name: Déployer la configuration logrotate (rotation quotidienne, 15 jours)
  ansible.builtin.template:
    src: logrotate-santalina.j2
    dest: /etc/logrotate.d/santalina
    owner: root
    group: root
    mode: "0644"
  become: true

# ── Vérification préalable du certificat SSL ──────────────────────────────────
# Le certificat est stocké dans un bind mount ({{ app_dir }}/letsencrypt) sur le VPS.
# Ce répertoire n'est jamais supprimé par docker compose down, même avec -v.
- name: Vérifier si le certificat SSL existe déjà (bind mount VPS)
  ansible.builtin.stat:
    path: "{{ app_dir }}/letsencrypt/live/{{ app_domain }}/fullchain.pem"
  register: ssl_cert_stat

- name: Mémoriser l'état du certificat SSL
  ansible.builtin.set_fact:
    ssl_cert_exists: "{{ ssl_cert_stat.stat.exists }}"

# ── Certificat auto-signé (ignoré automatiquement si Let's Encrypt est présent) ─
- name: Créer le répertoire des certificats auto-signés
  ansible.builtin.file:
    path: "{{ app_dir }}/certs"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: self_signed_ssl | default(false) and not ssl_cert_exists

- name: Vérifier si le certificat auto-signé existe déjà
  ansible.builtin.stat:
    path: "{{ app_dir }}/certs/selfsigned.crt"
  register: selfsigned_cert_stat
  when: self_signed_ssl | default(false) and not ssl_cert_exists

- name: Générer un certificat auto-signé TLS (si absent et Let's Encrypt absent)
  ansible.builtin.command:
    cmd: >-
      openssl req -x509 -nodes -newkey rsa:2048
      -keyout {{ app_dir }}/certs/selfsigned.key
      -out {{ app_dir }}/certs/selfsigned.crt
      -days 365
      -subj "/CN={{ app_domain }}"
  when: >
    self_signed_ssl | default(false)
    and not ssl_cert_exists
    and not (selfsigned_cert_stat.stat.exists | default(false))

- name: Restreindre les permissions du certificat auto-signé
  ansible.builtin.file:
    path: "{{ app_dir }}/certs/{{ item }}"
    mode: "0600"
    owner: root
  loop:
    - selfsigned.crt
    - selfsigned.key
  when: self_signed_ssl | default(false) and not ssl_cert_exists

# ── Déterminer le mode SSL actif ──────────────────────────────────────────────
- name: Déterminer le mode SSL actif (letsencrypt / selfsigned / none)
  ansible.builtin.set_fact:
    ssl_mode: >-
      {{ 'letsencrypt' if ssl_cert_exists else ('selfsigned' if (self_signed_ssl | default(false)) else 'none') }}

# ── Nginx — déployer directement la bonne configuration ──────────────────────
# Si le certificat existe déjà (re-déploiement), nginx démarre directement en
# HTTPS sans passer par une phase HTTP-only inutile.
- name: Déployer la configuration Nginx (HTTPS si cert présent, HTTP sinon)
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ app_dir }}/nginx/nginx.conf"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  vars:
    ssl_mode: "{{ ssl_mode }}"
  register: nginx_conf_deploy

# ── Démarrage des services ────────────────────────────────────────────────────
- name: Télécharger les images Docker depuis DockerHub
  ansible.builtin.command:
    cmd: docker compose pull
    chdir: "{{ app_dir }}"
  become: false

- name: Démarrer tous les services
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ app_dir }}"
  become: false

# Redémarrer nginx si son fichier de configuration a changé
# (ex : passage HTTP → HTTPS lors d'un re-déploiement — docker compose up -d
# ne redémarre pas un conteneur quand seul un fichier bind-mounté est modifié)
- name: Redémarrer Nginx si la configuration a changé
  ansible.builtin.command:
    cmd: docker compose restart nginx
    chdir: "{{ app_dir }}"
  become: false
  when: nginx_conf_deploy.changed

# ── DKIM — récupération de la clé publique ────────────────────────────────────
# La génération RSA peut prendre plusieurs minutes sur un VPS (entropie limitée).
# On utilise find pour chercher dans tout /etc/opendkim quel que soit le sous-dossier.
# failed_when: false + ignore_errors: true garantissent que cette tâche ne bloque
# jamais le déploiement même si la clé n'est pas encore disponible.
- name: Attendre que la clé DKIM soit générée dans le conteneur SMTP
  ansible.builtin.command:
    cmd: >-
      docker exec santalina-smtp
      sh -c 'find /etc/opendkim -name "*.txt" 2>/dev/null | wc -l'
    chdir: "{{ app_dir }}"
  become: false
  register: dkim_key_check
  retries: 60
  delay: 5
  until: dkim_key_check.rc == 0 and (dkim_key_check.stdout | trim | int) > 0
  failed_when: false
  ignore_errors: true
  when: not (mail_disabled | default(false))

- name: Corriger le propriétaire des clés DKIM sur l'hôte (OpenDKIM tourne avec uid 101 dans le conteneur)
  ansible.builtin.file:
    path: "{{ app_dir }}/dkim_keys"
    owner: "1000"
    group: "1000"
    mode: "0755"
    recurse: true
  become: true
  when: not (mail_disabled | default(false)) and dkim_key_check is defined and not dkim_key_check.failed | default(true)

- name: Redémarrer le conteneur SMTP après correction des permissions DKIM
  ansible.builtin.command:
    cmd: docker compose restart smtp
    chdir: "{{ app_dir }}"
  become: false
  when: not (mail_disabled | default(false)) and dkim_key_check is defined and not dkim_key_check.failed | default(true)

- name: Récupérer la clé publique DKIM générée
  ansible.builtin.command:
    cmd: >-
      docker exec santalina-smtp
      sh -c 'find /etc/opendkim -name "*.txt" -exec cat {} \; 2>/dev/null || echo "Clé DKIM non encore générée — relancez : docker exec santalina-smtp sh -c \"find /etc/opendkim -name *.txt -exec cat {} \\\\;\"'
    chdir: "{{ app_dir }}"
  become: false
  register: dkim_public_key
  failed_when: false
  ignore_errors: true
  when: not (mail_disabled | default(false))

- name: Afficher la clé publique DKIM (à copier dans le DNS)
  ansible.builtin.debug:
    msg:
      - "════════════════════════════════════════════════════════════"
      - "  ACTION REQUISE — Enregistrement DNS DKIM à créer"
      - "════════════════════════════════════════════════════════════"
      - "  Type  : TXT"
      - "  Nom   : mail._domainkey.{{ app_domain }}"
      - "  Valeur:"
      - "{{ dkim_public_key.stdout | default('(clé non disponible — réessayez dans quelques minutes)') }}"
      - "────────────────────────────────────────────────────────────"
      - "  Si la clé est vide, récupérez-la manuellement :"
      - "  docker exec santalina-smtp find /etc/opendkim -name '*.txt' -exec cat {} \\;"
      - "  Voir aussi : ansible/docs/smtp-authentication.md"
      - "════════════════════════════════════════════════════════════"
  when: not (mail_disabled | default(false)) and dkim_public_key is defined

# ── Import optionnel de données existantes ────────────────────────────────────
- name: Attendre que PostgreSQL soit prêt
  ansible.builtin.command:
    cmd: docker compose exec -T db pg_isready -U santalina
    chdir: "{{ app_dir }}"
  become: false
  register: pg_ready
  retries: 15
  delay: 3
  until: pg_ready.rc == 0
  when: db_seed_file is defined and db_seed_file != ''

- name: Copier le script SQL de données sur le serveur
  ansible.builtin.copy:
    src: "{{ db_seed_file }}"
    dest: "{{ app_dir }}/seed.sql"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  when: db_seed_file is defined and db_seed_file != ''

- name: Injecter via docker cp + psql
  block:
    - name: Copier le fichier SQL dans le conteneur db
      ansible.builtin.command:
        cmd: docker cp {{ app_dir }}/seed.sql santalina-db:/tmp/seed.sql
        chdir: "{{ app_dir }}"
      become: false

    - name: Exécuter le script SQL dans le conteneur
      ansible.builtin.command:
        cmd: >-
          docker compose exec -T db
          psql -U santalina -d santalina -f /tmp/seed.sql
        chdir: "{{ app_dir }}"
      become: false
      register: seed_result
      changed_when: true

    - name: Afficher le résultat de l'import SQL
      ansible.builtin.debug:
        msg:
          stdout: "{{ seed_result.stdout_lines | default([]) }}"
          stderr: "{{ seed_result.stderr_lines | default([]) }}"

    - name: Vérifier le nombre de lignes importées (tables principales)
      ansible.builtin.command:
        cmd: >-
          docker compose exec -T db
          psql -U santalina -d santalina -t -c
          "SELECT 'app_user=' || COUNT(*) FROM app_user
           UNION ALL SELECT 'dive_slot=' || COUNT(*) FROM dive_slot
           UNION ALL SELECT 'app_config=' || COUNT(*) FROM app_config;"
        chdir: "{{ app_dir }}"
      become: false
      register: row_counts
      changed_when: false
      failed_when: false

    - name: Afficher le nombre de lignes par table
      ansible.builtin.debug:
        msg: "Lignes après import : {{ row_counts.stdout_lines | default([]) }}"

    - name: Supprimer le fichier SQL temporaire du serveur
      ansible.builtin.file:
        path: "{{ app_dir }}/seed.sql"
        state: absent
  when: db_seed_file is defined and db_seed_file != ''

# ── Let's Encrypt (uniquement si le certificat est absent) ───────────────────
- name: Obtenir le certificat SSL Let's Encrypt (uniquement si absent)
  ansible.builtin.command:
    cmd: >
      docker compose run --rm --entrypoint certbot certbot certonly
      --webroot -w /var/www/certbot
      -d {{ app_domain }} -d www.{{ app_domain }}
      --email {{ letsencrypt_email }}
      --agree-tos --non-interactive --no-eff-email
    chdir: "{{ app_dir }}"
  become: false
  register: certbot_result
  failed_when: false
  when: obtain_ssl | default(true) and not ssl_cert_exists

- name: Afficher le résultat de Let's Encrypt
  ansible.builtin.debug:
    msg: "Certbot : {{ certbot_result.stdout | default('') }}"
  when: obtain_ssl | default(true) and not ssl_cert_exists

- name: Avertir en cas d'échec Let's Encrypt (rate limit ou autre)
  ansible.builtin.debug:
    msg: >-
      AVERTISSEMENT : Let's Encrypt a échoué (code {{ certbot_result.rc | default('?') }}).
      {{ certbot_result.stderr | default('') }}
      → Relancez demain ou utilisez -e "obtain_ssl=false" -e "self_signed_ssl=true" pour continuer avec un certificat auto-signé.
  when: >
    obtain_ssl | default(true)
    and not ssl_cert_exists
    and (certbot_result.rc | default(0)) != 0

# ── Nginx — activer HTTPS après obtention du certificat ──────────────────────
# On re-vérifie l'existence du fichier cert APRÈS l'exécution de certbot.
# Certbot peut retourner un code non-zéro (warning, rate limit partiel…) même
# quand le certificat a bien été écrit sur disque. Conditionner sur rc==0 ferait
# manquer la bascule HTTPS et forcerait un second passage du playbook.
- name: Vérifier si le certificat SSL a bien été obtenu (post-certbot)
  ansible.builtin.stat:
    path: "{{ app_dir }}/letsencrypt/live/{{ app_domain }}/fullchain.pem"
  register: ssl_cert_post_certbot
  when: obtain_ssl | default(true) and not ssl_cert_exists

- name: Déployer la configuration Nginx avec HTTPS (post-certbot)
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ app_dir }}/nginx/nginx.conf"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  vars:
    ssl_mode: letsencrypt
  when: obtain_ssl | default(true) and not ssl_cert_exists and (ssl_cert_post_certbot.stat.exists | default(false))

- name: Redémarrer Nginx pour activer la configuration HTTPS
  ansible.builtin.command:
    cmd: docker compose restart nginx
    chdir: "{{ app_dir }}"
  become: false
  when: obtain_ssl | default(true) and not ssl_cert_exists and (ssl_cert_post_certbot.stat.exists | default(false))
