---
# ── Répertoires ───────────────────────────────────────────────────────────────
- name: Créer le répertoire de déploiement
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0750"

- name: Créer le répertoire des clés JWT
  ansible.builtin.file:
    path: "{{ app_dir }}/keys"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"

- name: Créer le répertoire nginx
  ansible.builtin.file:
    path: "{{ app_dir }}/nginx"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

# ── Clés RSA JWT ──────────────────────────────────────────────────────────────
- name: Vérifier si la clé privée JWT existe déjà
  ansible.builtin.stat:
    path: "{{ app_dir }}/keys/privateKey.pem"
  register: jwt_private_key_stat

- name: Générer la clé privée RSA 2048 bits PKCS8 (si absente)
  ansible.builtin.command:
    cmd: >-
      openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048
      -out {{ app_dir }}/keys/privateKey.pem
  when: not jwt_private_key_stat.stat.exists
  become: false

- name: Extraire la clé publique (si absente)
  ansible.builtin.command:
    cmd: >-
      openssl pkey -in {{ app_dir }}/keys/privateKey.pem
      -pubout -out {{ app_dir }}/keys/publicKey.pem
  when: not jwt_private_key_stat.stat.exists
  become: false

- name: Restreindre les permissions des clés JWT
  ansible.builtin.file:
    path: "{{ app_dir }}/keys/{{ item }}"
    mode: "0600"
    owner: "{{ ansible_user }}"
  loop:
    - privateKey.pem
    - publicKey.pem

- name: Lire le contenu de la clé publique JWT
  ansible.builtin.slurp:
    src: "{{ app_dir }}/keys/publicKey.pem"
  register: jwt_public_key_content

- name: Lire le contenu de la clé privée JWT
  ansible.builtin.slurp:
    src: "{{ app_dir }}/keys/privateKey.pem"
  register: jwt_private_key_content

# ── Fichiers de configuration ─────────────────────────────────────────────────
- name: Déployer le fichier .env (variables d'environnement)
  ansible.builtin.template:
    src: env.j2
    dest: "{{ app_dir }}/.env"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: Déployer docker-compose.prod.yml
  ansible.builtin.template:
    src: docker-compose.prod.yml.j2
    dest: "{{ app_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0640"

# ── Nginx — phase 1 : HTTP only (pour obtenir le cert Let's Encrypt) ─────────
- name: Déployer la configuration Nginx (HTTP uniquement, première installation)
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ app_dir }}/nginx/nginx.conf"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  vars:
    ssl_enabled: false

# ── Démarrage des services ────────────────────────────────────────────────────
- name: Télécharger les images Docker depuis DockerHub
  ansible.builtin.command:
    cmd: docker compose pull
    chdir: "{{ app_dir }}"
  become: false

- name: Démarrer tous les services
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ app_dir }}"
  become: false

# ── Let's Encrypt (première obtention du certificat SSL) ─────────────────────
- name: Obtenir le certificat SSL Let's Encrypt
  ansible.builtin.command:
    cmd: >
      docker compose run --rm --entrypoint certbot certbot certonly
      --webroot -w /var/www/certbot
      -d {{ app_domain }}
      --email {{ letsencrypt_email }}
      --agree-tos --non-interactive --no-eff-email
    chdir: "{{ app_dir }}"
  become: false
  register: certbot_result
  when: obtain_ssl | default(true)
  ignore_errors: true

- name: Afficher le résultat de Let's Encrypt
  ansible.builtin.debug:
    msg: "Certbot : {{ certbot_result.stdout | default('pas de sortie') }}"
  when: obtain_ssl | default(true)

- name: Vérifier la présence du certificat SSL sur disque
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ app_domain }}/fullchain.pem"
  register: ssl_cert_stat
  when: obtain_ssl | default(true)

# ── Nginx — phase 2 : HTTPS (après obtention du cert) ────────────────────────
- name: Déployer la configuration Nginx avec HTTPS
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ app_dir }}/nginx/nginx.conf"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  vars:
    ssl_enabled: true
  when: obtain_ssl | default(true) and ssl_cert_stat.stat.exists

- name: Redémarrer Nginx pour activer la configuration HTTPS
  ansible.builtin.command:
    cmd: docker compose restart nginx
    chdir: "{{ app_dir }}"
  become: false
  when: obtain_ssl | default(true) and ssl_cert_stat.stat.exists
