---
# ── Répertoires ───────────────────────────────────────────────────────────────
- name: Créer le répertoire de déploiement
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0750"

- name: Créer le répertoire des clés JWT
  ansible.builtin.file:
    path: "{{ app_dir }}/keys"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"

- name: Créer le répertoire nginx
  ansible.builtin.file:
    path: "{{ app_dir }}/nginx"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

# ── Clés RSA JWT ──────────────────────────────────────────────────────────────
- name: Vérifier si la clé privée JWT existe déjà
  ansible.builtin.stat:
    path: "{{ app_dir }}/keys/privateKey.pem"
  register: jwt_private_key_stat

- name: Générer la clé privée RSA 2048 bits (si absente)
  ansible.builtin.command:
    cmd: openssl genrsa -out {{ app_dir }}/keys/privateKey.pem 2048
  when: not jwt_private_key_stat.stat.exists
  become: false

- name: Extraire la clé publique (si absente)
  ansible.builtin.command:
    cmd: >
      openssl rsa
      -in {{ app_dir }}/keys/privateKey.pem
      -pubout -out {{ app_dir }}/keys/publicKey.pem
  when: not jwt_private_key_stat.stat.exists
  become: false

- name: Restreindre les permissions des clés JWT
  ansible.builtin.file:
    path: "{{ app_dir }}/keys/{{ item }}"
    mode: "0600"
    owner: "{{ ansible_user }}"
  loop:
    - privateKey.pem
    - publicKey.pem

# ── Fichiers de configuration ─────────────────────────────────────────────────
- name: Déployer le fichier .env (variables d'environnement)
  ansible.builtin.template:
    src: env.j2
    dest: "{{ app_dir }}/.env"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: Déployer docker-compose.prod.yml
  ansible.builtin.template:
    src: docker-compose.prod.yml.j2
    dest: "{{ app_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0640"

# ── Nginx — phase 1 : HTTP only (pour obtenir le cert Let's Encrypt) ─────────
- name: Déployer la configuration Nginx (HTTP uniquement, première installation)
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ app_dir }}/nginx/nginx.conf"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  vars:
    ssl_enabled: false

# ── Démarrage des services ────────────────────────────────────────────────────
- name: Télécharger les images Docker depuis DockerHub
  ansible.builtin.command:
    cmd: docker compose pull
    chdir: "{{ app_dir }}"
  become: false

- name: Démarrer tous les services
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ app_dir }}"
  become: false

# ── Let's Encrypt (première obtention du certificat SSL) ─────────────────────
- name: Attendre que Nginx soit opérationnel sur le port 80
  ansible.builtin.wait_for:
    host: "{{ app_domain }}"
    port: 80
    delay: 5
    timeout: 60
  when: obtain_ssl | default(true)

- name: Obtenir le certificat SSL Let's Encrypt
  ansible.builtin.command:
    cmd: >
      docker compose run --rm
      --entrypoint certbot
      certbot certonly
      --webroot -w /var/www/certbot
      -d {{ app_domain }}
      --email {{ letsencrypt_email }}
      --agree-tos --non-interactive
    chdir: "{{ app_dir }}"
  become: false
  register: certbot_result
  when: obtain_ssl | default(true)
  ignore_errors: true

- name: Afficher le résultat de Let's Encrypt
  ansible.builtin.debug:
    msg:
      stdout: "{{ certbot_result.stdout | default('(vide)') }}"
      stderr: "{{ certbot_result.stderr | default('(vide)') }}"
      rc: "{{ certbot_result.rc | default(-1) }}"
  when: obtain_ssl | default(true)

# ── Attendre que Quarkus soit prêt avant de basculer en HTTPS ────────────────
- name: Attendre que l'application Quarkus réponde (via nginx port 80)
  ansible.builtin.uri:
    url: "http://{{ app_domain }}/q/health/live"
    status_code: 200
    timeout: 10
  register: health_probe
  until: health_probe.status == 200
  retries: 18
  delay: 10

# ── Nginx — phase 2 : HTTPS (après obtention du cert) ────────────────────────
- name: Déployer la configuration Nginx avec HTTPS
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ app_dir }}/nginx/nginx.conf"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  vars:
    ssl_enabled: true
  when: obtain_ssl | default(true) and certbot_result is defined and certbot_result is succeeded

- name: Redémarrer Nginx pour appliquer la configuration HTTPS
  ansible.builtin.command:
    cmd: docker compose restart nginx
    chdir: "{{ app_dir }}"
  become: false
  when: obtain_ssl | default(true) and certbot_result is defined and certbot_result is succeeded

- name: Vérifier que HTTPS est opérationnel
  ansible.builtin.wait_for:
    host: "{{ app_domain }}"
    port: 443
    delay: 3
    timeout: 30
  when: obtain_ssl | default(true) and certbot_result is defined and certbot_result is succeeded
