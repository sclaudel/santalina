# ── Redirection HTTP → HTTPS ──────────────────────────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Validation Let's Encrypt (ne pas supprimer)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Reverse proxy HTTPS ───────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # Certificats Let's Encrypt
    # Obtenus via : docker compose run --rm certbot certonly --webroot
    #               -w /var/www/certbot -d YOUR_DOMAIN
    #               --email YOUR_EMAIL --agree-tos --non-interactive
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Protocoles et chiffrements (Mozilla Intermediate)
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # En-têtes de sécurité
    add_header Strict-Transport-Security "max-age=15768000" always;
    add_header X-Content-Type-Options    nosniff;
    add_header X-Frame-Options           SAMEORIGIN;
    add_header X-XSS-Protection          "1; mode=block";

    # Taille maximale des uploads
    client_max_body_size 25M;

    # Validation Let's Encrypt (renouvellement)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy vers l'application Quarkus
    location / {
        proxy_pass         http://app:8085;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering    off;
    }
}
