services:

  # ── Base de données PostgreSQL (accès interne uniquement) ─────────────────
  db:
    image: postgres:16-alpine
    container_name: santalina-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: santalina
      POSTGRES_USER: santalina
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U santalina"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Application Quarkus (accès interne uniquement) ────────────────────────
  app:
    # Remplacez DOCKERHUB_USERNAME par votre nom d'utilisateur DockerHub
    image: DOCKERHUB_USERNAME/santalina:latest
    container_name: santalina-app
    restart: unless-stopped
    environment:
      QUARKUS_PROFILE: prod
      JDBC_URL: jdbc:postgresql://db:5432/santalina
      DB_USER: santalina
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      MAILER_FROM: ${MAILER_FROM}
      MAILER_HOST: ${MAILER_HOST}
      MAILER_PORT: ${MAILER_PORT}
      # Niveaux de log (TRACE|DEBUG|INFO|WARN|ERROR)
      # LOG_LEVEL      : niveau racine (défaut : INFO)
      # APP_LOG_LEVEL  : code org.santalina uniquement (défaut : INFO)
      # MAILER_LOG_LEVEL : couches SMTP — mettre DEBUG pour diagnostiquer l'envoi (défaut : INFO)
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      MAILER_LOG_LEVEL: ${MAILER_LOG_LEVEL:-INFO}
      JWT_PRIVATE_KEY_PATH: /run/secrets/jwt_private_key
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public_key
    secrets:
      - jwt_private_key
      - jwt_public_key
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_data:/deployments/data
    networks:
      - internal

  # ── Nginx — reverse proxy (seul service exposé sur Internet) ─────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: santalina-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - internal

  # ── Certbot — renouvellement automatique des certificats SSL ─────────────
  certbot:
    image: certbot/certbot
    container_name: santalina-certbot
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Vérifie et renouvelle les certificats toutes les 12 heures
    entrypoint: >
      /bin/sh -c 'trap exit TERM;
      while :; do
        certbot renew --quiet --webroot -w /var/www/certbot;
        sleep 12h & wait $${!};
      done;'

# ── Docker secrets (clés RSA JWT) ────────────────────────────────────────────
secrets:
  jwt_private_key:
    file: ./keys/privateKey.pem
  jwt_public_key:
    file: ./keys/publicKey.pem

# ── Réseau interne ────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  app_data:
  certbot_certs:
  certbot_www:
