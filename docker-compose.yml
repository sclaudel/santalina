services:

  # ---- Base de données PostgreSQL ----
  db:
    image: postgres:16-alpine
    container_name: santalina-db
    restart: unless-stopped
    environment:
      TZ: Europe/Paris
      POSTGRES_DB: santalina
      POSTGRES_USER: santalina
      POSTGRES_PASSWORD: santalina_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U santalina"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Application Quarkus ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: santalina-app
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      TZ: Europe/Paris
      QUARKUS_PROFILE: prod
      JDBC_URL: jdbc:postgresql://db:5432/santalina
      DB_USER: santalina
      DB_PASSWORD: santalina_secret
      # Surcharger le compte admin par défaut
      ADMIN_EMAIL: admin@santalina.com
      ADMIN_PASSWORD: AdminSecure@2024!
      # Mailer SMTP (optionnel, remplacer par vos paramètres)
      MAILER_FROM: noreply@santalina.com
      MAILER_HOST: mailhog
      MAILER_PORT: 1025
      # Capacité du lac
      APP_DIVING_MAX_DIVERS: 25
      # Chemins des clés JWT injectées via Docker secrets
      JWT_PRIVATE_KEY_PATH: /run/secrets/jwt_private_key
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public_key
    secrets:
      - jwt_private_key
      - jwt_public_key
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_data:/deployments/data

  # ---- Mailhog (serveur SMTP de test) ----
  mailhog:
    image: mailhog/mailhog:latest
    container_name: santalina-mail
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Interface web

# ---- Docker secrets (fichiers montés en lecture seule dans /run/secrets/) ----
# Générer les clés une fois avec : python generate_keys.py
# Les fichiers doivent se trouver dans le dossier keys/ à la racine du projet.
secrets:
  jwt_private_key:
    file: ./keys/privateKey.pem
  jwt_public_key:
    file: ./keys/publicKey.pem

volumes:
  postgres_data:
  app_data:
