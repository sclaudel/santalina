# Désactivation complète des Dev Services en mode test (pas de Docker requis)
quarkus.devservices.enabled=false

# Datasource H2 in-memory
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

# Hibernate / Flyway
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
# Inclut les fixtures de test en plus des migrations principales
quarkus.flyway.locations=db/migration,db/testdata

# Mailer mock (pas de conteneur SMTP)
quarkus.mailer.mock=true
quarkus.mailer.devservices.enabled=false

