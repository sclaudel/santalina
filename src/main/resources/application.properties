﻿# Application
quarkus.application.name=santalina
quarkus.http.port=8085

# Diving site config
app.diving.site-name=Carri\u00e8re de Saint-Lin

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS

# JWT
# En dev/test : les fichiers sont lus depuis le classpath (src/main/resources/)
# En prod Docker : les chemins sont surchargés via les variables d'environnement
#                  injectées par les Docker secrets (voir docker-compose.yml)
mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_PATH:publicKey.pem}
smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY_PATH:privateKey.pem}
mp.jwt.verify.issuer=santalina-app
quarkus.smallrye-jwt.enabled=true

# ========== Datasource par d&eacute;faut (H2 fichier ? utilis&eacute; si aucun profil actif) ==========
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:file:./data/santalina;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=10
quarkus.datasource.jdbc.acquisition-timeout=30
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true

# ========== DEV profile (H2 file) ==========
%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:file:./data/santalina;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
%dev.quarkus.datasource.username=sa
%dev.quarkus.datasource.password=
%dev.quarkus.datasource.jdbc.min-size=2
%dev.quarkus.datasource.jdbc.max-size=10
%dev.quarkus.datasource.jdbc.acquisition-timeout=30
%dev.quarkus.hibernate-orm.database.generation=none
%dev.quarkus.flyway.migrate-at-start=true
%dev.quarkus.mailer.mock=true
%dev.quarkus.mailer.devservices.enabled=false
%dev.quarkus.devservices.enabled=false

# ========== TEST profile (H2 in-memory) ==========
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.quarkus.datasource.jdbc.min-size=2
%test.quarkus.datasource.jdbc.max-size=10
%test.quarkus.hibernate-orm.database.generation=none
%test.quarkus.flyway.migrate-at-start=true
%test.quarkus.mailer.mock=true
%test.quarkus.mailer.devservices.enabled=false
%test.quarkus.devservices.enabled=false

# ========== PROD profile (PostgreSQL) ==========
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.jdbc.url=${JDBC_URL:jdbc:postgresql://localhost:5432/santalina}
%prod.quarkus.datasource.username=${DB_USER:santalina}
%prod.quarkus.datasource.password=${DB_PASSWORD:santalina}
%prod.quarkus.hibernate-orm.database.generation=none
%prod.quarkus.flyway.migrate-at-start=true
%prod.quarkus.mailer.mock=false
%prod.quarkus.mailer.from=${MAILER_FROM:noreply@santalina.com}
%prod.quarkus.mailer.host=${MAILER_HOST:localhost}
%prod.quarkus.mailer.port=${MAILER_PORT:587}
%prod.quarkus.mailer.username=${MAILER_USER:}
%prod.quarkus.mailer.password=${MAILER_PASSWORD:}
# DISABLED | OPTIONAL | REQUIRED — OPTIONAL permet de se connecter avec ou sans STARTTLS
%prod.quarkus.mailer.start-tls=${MAILER_START_TLS:OPTIONAL}
# true pour les serveurs exigeant SSL implicite (ex. port 465)
%prod.quarkus.mailer.ssl=${MAILER_SSL:false}
# true pour accepter les certificats auto-signés (serveurs internes)
%prod.quarkus.mailer.trust-all=${MAILER_TRUST_ALL:false}

# ========== Logging ==========
# Niveaux valides : TRACE, DEBUG, INFO, WARN, ERROR
# LOG_LEVEL     → niveau racine de toute l'application
# APP_LOG_LEVEL → niveau spécifique au code org.santalina (surcharge LOG_LEVEL)
# MAILER_LOG_LEVEL → niveau spécifique aux couches SMTP (debug connexion mail)
quarkus.log.level=INFO
quarkus.log.category."org.santalina".level=INFO
quarkus.log.category."io.quarkus.mailer".level=INFO
quarkus.log.category."io.vertx.ext.mail".level=INFO
%prod.quarkus.log.level=${LOG_LEVEL:INFO}
%prod.quarkus.log.category."org.santalina".level=${APP_LOG_LEVEL:INFO}
%prod.quarkus.log.category."io.quarkus.mailer".level=${MAILER_LOG_LEVEL:INFO}
%prod.quarkus.log.category."io.vertx.ext.mail".level=${MAILER_LOG_LEVEL:INFO}

# Flyway
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.repair-at-start=true
# Dev et test utilisent H2 : inclure les migrations H2-spécifiques
%dev.quarkus.flyway.locations=classpath:db/migration,classpath:db/h2
%test.quarkus.flyway.locations=classpath:db/migration,classpath:db/h2

# Hibernate ORM
quarkus.hibernate-orm.log.sql=false

# ========== Business config ==========
app.diving.max-divers=25
app.diving.slot.min-hours=1
app.diving.slot.max-hours=10
app.diving.slot.resolution-minutes=15
app.diving.reset-token.expiry-minutes=30
app.diving.jwt.expiry-hours=24
app.diving.admin.email=${ADMIN_EMAIL:admin@santalina.com}
app.diving.admin.password=${ADMIN_PASSWORD:Admin1234}
app.diving.base-url=${APP_BASE_URL:http://localhost:8085}

# Static resources (frontend React)
quarkus.http.root-path=/
quarkus.http.non-application-root-path=/q

# OpenAPI
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true

