<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fond cercle bleu océan -->
  <circle cx="32" cy="32" r="32" fill="#0369a1"/>

  <!-- Masque de plongée — verre ovale -->
  <ellipse cx="32" cy="30" rx="18" ry="13" fill="#bae6fd" stroke="#fff" stroke-width="2.5"/>

  <!-- Sangle du masque -->
  <path d="M14 30 Q8 30 8 24 Q8 18 14 18" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M50 30 Q56 30 56 24 Q56 18 50 18" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M14 18 Q32 12 50 18" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Reflet sur le verre -->
  <ellipse cx="24" cy="25" rx="5" ry="3" fill="white" opacity="0.35" transform="rotate(-20 24 25)"/>

  <!-- Tuba -->
  <path d="M50 22 Q60 20 60 12 Q60 8 56 8" fill="none" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <circle cx="56" cy="7" r="3" fill="#fbbf24"/>

  <!-- Bulles -->
  <circle cx="38" cy="50" r="3"   fill="none" stroke="#bae6fd" stroke-width="1.5" opacity="0.8"/>
  <circle cx="30" cy="56" r="2"   fill="none" stroke="#bae6fd" stroke-width="1.5" opacity="0.6"/>
  <circle cx="44" cy="57" r="1.5" fill="none" stroke="#bae6fd" stroke-width="1.2" opacity="0.5"/>
</svg>
